<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #0a0a0f;
    color: #c8c8d4;
    font-family: 'Courier New', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #header {
    padding: 12px 20px;
    border-bottom: 1px solid #1a1a2e;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #333;
    transition: background 0.3s;
  }
  #status-dot.active { background: #4a9eff; }
  #status-dot.thinking { background: #ff9a3c; }
  #status-dot.error { background: #ff4444; }

  #header-title {
    font-size: 13px;
    color: #666;
    letter-spacing: 2px;
  }

  #api-section {
    padding: 8px 20px;
    border-bottom: 1px solid #1a1a2e;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  #api-key-input {
    flex: 1;
    background: #0f0f1a;
    border: 1px solid #1a1a2e;
    color: #888;
    padding: 6px 10px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    border-radius: 3px;
  }

  #api-key-input:focus { outline: none; border-color: #2a2a4e; }

  select, button {
    background: #0f0f1a;
    border: 1px solid #1a1a2e;
    color: #888;
    padding: 6px 12px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    border-radius: 3px;
    cursor: pointer;
  }

  button:hover { border-color: #4a9eff; color: #4a9eff; }

  #chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .message {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1.6;
  }

  .message.user {
    align-self: flex-end;
    background: #0f1a2e;
    border: 1px solid #1a2a4e;
    color: #8ab4d4;
  }

  .message.assistant {
    align-self: flex-start;
    background: #0f0f1a;
    border: 1px solid #1a1a2e;
    color: #c8c8d4;
  }

  .message.system {
    align-self: center;
    background: transparent;
    border: none;
    color: #333;
    font-size: 11px;
    letter-spacing: 1px;
  }

  /* ТОЧКИ ДРАКОНОВ — скрытые маркеры для будущих модулей */
  .message.assistant[data-dragon="white"] { border-left: 2px solid #e8e8ff; }
  .message.assistant[data-dragon="black"] { border-left: 2px solid #1a1a1a; }
  .message.assistant[data-dragon="blue"]  { border-left: 2px solid #1a3a6e; }
  .message.assistant[data-dragon="red"]   { border-left: 2px solid #3a0a0a; }

  #input-area {
    padding: 16px 20px;
    border-top: 1px solid #1a1a2e;
    display: flex;
    gap: 8px;
  }

  #user-input {
    flex: 1;
    background: #0f0f1a;
    border: 1px solid #1a1a2e;
    color: #c8c8d4;
    padding: 10px 14px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    border-radius: 3px;
    resize: none;
    height: 44px;
  }

  #user-input:focus { outline: none; border-color: #2a2a4e; }

  #send-btn {
    padding: 10px 20px;
    font-size: 13px;
    color: #4a9eff;
    border-color: #1a3a6e;
  }

  #send-btn:hover { background: #0a1a2e; }

  /* ПАМЯТЬ — скрытые контейнеры для будущих модулей */
  #memory-short  { display: none; } /* краткосрочная память */
  #memory-mid    { display: none; } /* среднесрочная память */
  #memory-long   { display: none; } /* долгосрочная память */

  /* ТОЧКА ПОДКЛЮЧЕНИЯ ЛОКАЛЬНОЙ МОДЕЛИ */
  /* LOCAL_MODEL_ENDPOINT = "" — заполнить когда будет железо */

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a0a0f; }
  ::-webkit-scrollbar-thumb { background: #1a1a2e; }
</style>
</head>
<body>

<!-- ФАСАД -->
<div id="header">
  <div id="status-dot"></div>
  <span id="header-title">s a s</span>
  <span style="margin-left:auto; font-size:11px; color:#333;" id="model-display"></span>
</div>

<!-- API СЕКЦИЯ -->
<div id="api-section">
  <input type="password" id="api-key-input" placeholder="groq api key / local endpoint" />
  <select id="model-select">
    <optgroup label="GROQ">
      <option value="groq:llama-3.3-70b-versatile">llama-3.3-70b</option>
      <option value="groq:mixtral-8x7b-32768">mixtral-8x7b</option>
      <option value="groq:gemma2-9b-it">gemma2-9b</option>
    </optgroup>
    <optgroup label="LOCAL">
      <option value="local:http://localhost:11434">ollama localhost</option>
      <option value="local:custom">local custom</option>
    </optgroup>
  </select>
  <button onclick="saveConfig()">сохранить</button>
  <button onclick="clearChat()">очистить</button>
</div>

<!-- ЧАТ -->
<div id="chat-area">
  <div class="message system">— инициализация —</div>
</div>

<!-- СКРЫТАЯ ПАМЯТЬ -->
<div id="memory-short"></div>
<div id="memory-mid"></div>
<div id="memory-long"></div>

<!-- ВВОД -->
<div id="input-area">
  <textarea id="user-input" placeholder="введи сообщение..." 
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
  <button id="send-btn" onclick="sendMessage()">→</button>
</div>

<script>
// ============================================================
// SAS CORE — версия 0.1 — скелет
// точки подключения обозначены комментариями CONNECT_POINT
// ============================================================

const SAS = {

  // КОНФИГУРАЦИЯ
  config: {
    apiKey: localStorage.getItem('sas_key') || '',
    model: localStorage.getItem('sas_model') || 'groq:llama-3.3-70b-versatile',
    // CONNECT_POINT_LOCAL: адрес локальной модели
    localEndpoint: localStorage.getItem('sas_local') || 'http://localhost:11434',
  },

  // ПАМЯТЬ
  memory: {
    short: [],   // текущий разговор
    mid: [],     // CONNECT_POINT_MEMORY_MID — среднесрочная
    long: [],    // CONNECT_POINT_MEMORY_LONG — долгосрочная
  },

  // ФИЛЬТР — точка подключения драконов
  // CONNECT_POINT_FILTER — здесь будет sas_filter
  filter(text) {
    // базовая классификация — будет расширена
    const destructive = ['взломай','уничтожь','укради','обмани','убей'];
    const lower = text.toLowerCase();
    for(let word of destructive) {
      if(lower.includes(word)) return 'red'; // красный дракон
    }
    return 'white'; // белый дракон по умолчанию
  },

  // СИСТЕМНЫЙ ПРОМПТ — ядро личности
  // CONNECT_POINT_CORE — здесь будет загружаться sas_core
  getSystemPrompt() {
    return `ты ассистент. отвечай кратко и по существу. 
задавай вопросы если что-то неясно. 
не болтай лишнего.`;
    // сюда будет загружаться полное ядро SAS
  },

  // ОТПРАВКА К GROQ
  // CONNECT_POINT_GROQ
  async sendToGroq(messages) {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${this.config.apiKey}`
      },
      body: JSON.stringify({
        model: this.config.model.replace('groq:', ''),
        messages: messages,
        max_tokens: 1024,
        temperature: 0.7
      })
    });
    const data = await response.json();
    if(data.error) throw new Error(data.error.message);
    return data.choices[0].message.content;
  },

  // ОТПРАВКА К ЛОКАЛЬНОЙ МОДЕЛИ
  // CONNECT_POINT_LOCAL_MODEL
  async sendToLocal(messages) {
    // ollama формат
    const response = await fetch(`${this.config.localEndpoint}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'mistral', // заменить на нужную модель
        messages: messages,
        stream: false
      })
    });
    const data = await response.json();
    return data.message.content;
  },

  // ГЛАВНЫЙ ПРОЦЕСС
  async process(userText) {
    // шаг 1 — фильтр
    const dragon = this.filter(userText);
    
    // шаг 2 — если красный дракон
    if(dragon === 'red') {
      // CONNECT_POINT_RED_DRAGON
      return { text: 'нет доступа к этой информации.', dragon: 'red' };
    }

    // шаг 3 — формируем сообщения
    const messages = [
      { role: 'system', content: this.getSystemPrompt() },
      ...this.memory.short,
      { role: 'user', content: userText }
    ];

    // шаг 4 — выбор модели
    let responseText;
    const modelType = this.config.model.split(':')[0];
    
    if(modelType === 'groq') {
      responseText = await this.sendToGroq(messages);
    } else if(modelType === 'local') {
      responseText = await this.sendToLocal(messages);
    }

    // шаг 5 — сохранение в краткосрочную память
    this.memory.short.push({ role: 'user', content: userText });
    this.memory.short.push({ role: 'assistant', content: responseText });
    // ограничение краткосрочной памяти — последние 20 сообщений
    if(this.memory.short.length > 20) {
      this.memory.short = this.memory.short.slice(-20);
      // CONNECT_POINT_MEMORY_TRANSFER — перенос в среднесрочную память
    }

    return { text: responseText, dragon: dragon };
  }
};

// ============================================================
// UI
// ============================================================

function saveConfig() {
  const key = document.getElementById('api-key-input').value.trim();
  const model = document.getElementById('model-select').value;
  if(key) {
    SAS.config.apiKey = key;
    localStorage.setItem('sas_key', key);
  }
  SAS.config.model = model;
  localStorage.setItem('sas_model', model);
  document.getElementById('model-display').textContent = model.split(':')[1];
  document.getElementById('status-dot').className = 'active';
  addMessage('конфигурация сохранена', 'system');
}

function clearChat() {
  SAS.memory.short = [];
  document.getElementById('chat-area').innerHTML = 
    '<div class="message system">— очищено —</div>';
}

function addMessage(text, type, dragon) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = `message ${type}`;
  if(dragon) div.setAttribute('data-dragon', dragon);
  div.textContent = text;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if(!text) return;
  if(!SAS.config.apiKey) {
    addMessage('введи api key и нажми сохранить', 'system');
    return;
  }

  input.value = '';
  addMessage(text, 'user');
  
  const dot = document.getElementById('status-dot');
  dot.className = 'thinking';

  try {
    const result = await SAS.process(text);
    addMessage(result.text, 'assistant', result.dragon);
    dot.className = 'active';
  } catch(err) {
    addMessage('ошибка: ' + err.message, 'system');
    dot.className = 'error';
  }
}

// инициализация
window.onload = () => {
  if(SAS.config.apiKey) {
    document.getElementById('status-dot').className = 'active';
    document.getElementById('model-display').textContent = 
      SAS.config.model.split(':')[1];
    addMessage('готов', 'system');
  } else {
    addMessage('введи api key для начала', 'system');
  }
};
</script>
</body>
</html>
